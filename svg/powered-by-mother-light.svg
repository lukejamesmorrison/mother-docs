<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <defs>
    <style>
      .badge-text { font-family: 'Arial', sans-serif; }
    </style>
  </defs>
  <!-- Badge Background -->
  <rect x="0" y="0" width="180" height="40" rx="6" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Icon -->
  <circle cx="22" cy="20" r="12" fill="#C00000"/>
  <text x="22" y="25" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="Arial">M</text>
  <!-- Text -->
  <text x="42" y="18" fill="#FFFFFF" font-size="9" class="badge-text">POWERED BY</text>
  <text x="42" y="30" fill="#FFFFFF" font-size="14" font-weight="bold" class="badge-text">MOTHER</text>
</svg>
